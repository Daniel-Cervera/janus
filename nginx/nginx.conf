# nginx/nginx.conf
# Reverse proxy para producción de Casa Janus
# Next.js en :3000, Odoo en :8069

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: Next.js ─────────────────────────────────────
    upstream nextjs {
        server nextjs:3000;
        keepalive 32;
    }

    # ── Upstream: Odoo ────────────────────────────────────────
    upstream odoo {
        server odoo:8069;
        keepalive 32;
    }

    upstream odoo_longpoll {
        server odoo:8072;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name casajanus.com www.casajanus.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS: sitio principal (Next.js) ──────────────────────
    server {
        listen 443 ssl http2;
        server_name casajanus.com www.casajanus.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Caché de assets estáticos de Next.js
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Todo lo demás → Next.js
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── HTTPS: Odoo admin (subdominio) ────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.casajanus.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Longpolling / websocket
        location /websocket {
            proxy_pass http://odoo_longpoll;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Odoo web
        location / {
            proxy_pass http://odoo;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # Buffer para uploads de imágenes grandes
            client_max_body_size 50M;
            proxy_request_buffering off;
        }
    }
}