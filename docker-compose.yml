# docker-compose.yml
# Casa Janus — Stack completo de desarrollo (Versión Final Corregida)
#
# Servicios:
#   postgres   — Base de datos para Odoo
#   odoo       — Backend headless (API REST en :8069)
#   nextjs     — Frontend Next.js (en :3000)
#   cf_tunnel  — Cloudflare Tunnel (opcional, para HTTPS local)

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: casajanus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-casajanus}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Debes definir POSTGRES_PASSWORD en .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-casajanus}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casajanus_net

  # ── Odoo ──────────────────────────────────────────────────────────────
  odoo:
    build:
      context: ./odoo
    container_name: casajanus_odoo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HOST=postgres
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD}
      - DB=${POSTGRES_DB:-casajanus}
      - CASA_JANUS_API_TOKEN=${CASA_JANUS_API_TOKEN}
      - CASA_JANUS_CF_IMAGES_BASE_URL=${CF_IMAGES_BASE_URL}
      - CASA_JANUS_CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CASA_JANUS_CF_IMAGES_API_TOKEN=${CF_IMAGES_API_TOKEN}
      - CASA_JANUS_NEXTJS_BASE_URL=${NEXTJS_BASE_URL:-http://nextjs:3000}
      - CASA_JANUS_NEXTJS_REVALIDATE_TOKEN=${NEXTJS_REVALIDATE_TOKEN}
    volumes:
      - ./odoo/addons:/mnt/extra-addons
      - ./scripts:/mnt/scripts
      - odoo_data:/var/lib/odoo
    ports:
      - "8069:8069"
      - "8072:8072"
    healthcheck:
      # CORRECCIÓN: Puerto 8069 es el estándar para Odoo
      test: [ "CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - casajanus_net

  # ── Next.js ───────────────────────────────────────────────────────────
  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
      target: development
    container_name: casajanus_nextjs
    restart: unless-stopped
    depends_on:
      odoo:
        condition: service_healthy
    environment:
      # CORRECCIÓN: Apuntando al puerto 8069 del servicio 'odoo'
      ODOO_BASE_URL: http://odoo:8069
      ODOO_URL: http://odoo:8069
      ODOO_DB: ${POSTGRES_DB:-casajanus}
      ODOO_API_TOKEN: ${CASA_JANUS_API_TOKEN}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    volumes:
      - ./nextjs:/app
      - nextjs_node_modules:/app/node_modules
      - nextjs_next_cache:/app/.next
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:3000/api/gallery || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - casajanus_net

  # ── Cloudflare Tunnel (Opcional) ──────────────────────────────────────
  cf_tunnel:
    image: cloudflare/cloudflared:latest
    container_name: casajanus_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - nextjs
    profiles:
      - tunnel
    networks:
      - casajanus_net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: casajanus_postgres_data
  odoo_data:
    name: casajanus_odoo_data
  nextjs_node_modules:
    name: casajanus_nextjs_node_modules
  nextjs_next_cache:
    name: casajanus_nextjs_next_cache

# ── Network ────────────────────────────────────────────────────────────────
networks:
  casajanus_net:
    name: casajanus_network
    driver: bridge
